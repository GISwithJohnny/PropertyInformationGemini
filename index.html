<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chattanooga Garbage Lookup</title>
    
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f0f4f8; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a5a96; margin-bottom: 5px; }
        .sub-text { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #0079c1; }
        button { padding: 12px 20px; background: #0079c1; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #005a91; }
        #status { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; border-left: 6px solid #0079c1; background: #f8fbff; text-align: left; }
        .day-result { font-size: 2.2rem; font-weight: 800; color: #d32f2f; margin-top: 10px; display: block; }
        .error { color: #d32f2f; font-weight: bold; border-color: #d32f2f; }
    </style>
</head>
<body>

<div class="container">
    <h2>Waste Collection Day</h2>
    <p class="sub-text">Enter your address to see your garbage day.</p>
    
    <div class="search-box">
        <input type="text" id="addrInput" placeholder="e.g. 1100 Market St" onkeypress="handleKey(event)">
        <button onclick="doLookup()">Search</button>
    </div>

    <div id="status"></div>
</div>

<script>
    require(["esri/layers/FeatureLayer"], function(FeatureLayer) {
        
        // We use a CORS proxy to bypass the city's server restrictions
        const PROXY = "https://corsproxy.io/?";
        const ADDR_URL = "https://pwgis.chattanooga.gov/arcgis/rest/services/Misc/Addressing_FeatService/FeatureServer/0";
        const GARB_URL = "https://services2.arcgis.com/OIAIimblRxPs0xxc/arcgis/rest/services/Garbage_Service_Areas/FeatureServer/0";

        const addrLayer = new FeatureLayer({ url: PROXY + encodeURIComponent(ADDR_URL) });
        const garbLayer = new FeatureLayer({ url: GARB_URL }); // ESRI-hosted, usually no proxy needed

        window.handleKey = (e) => { if(e.key === "Enter") doLookup(); };

        window.doLookup = async function() {
            const val = document.getElementById("addrInput").value.trim().toUpperCase();
            const box = document.getElementById("status");
            if (!val) return;

            box.style.display = "block";
            box.classList.remove("error");
            box.innerHTML = "Checking city records...";

            try {
                // 1. Match Address String to Point
                const aQuery = addrLayer.createQuery();
                // Matching against common Chattanooga GIS field names
                aQuery.where = `FullAddres LIKE '%${val}%' OR ADDR_LABEL LIKE '%${val}%' OR FULL_ADDR LIKE '%${val}%'`;
                aQuery.outFields = ["FullAddres", "ADDR_LABEL"];
                aQuery.returnGeometry = true;
                aQuery.num = 1;

                const aRes = await addrLayer.queryFeatures(aQuery);

                if (aRes.features.length === 0) {
                    box.classList.add("error");
                    box.innerHTML = "No address found. Try searching for just the number and street name (e.g., '1100 Market').";
                    return;
                }

                const feat = aRes.features[0];
                const cleanAddr = feat.attributes.FullAddres || feat.attributes.ADDR_LABEL || val;
                box.innerHTML = `Found: <strong>${cleanAddr}</strong><br>Locating service area...`;

                // 2. Intersect Point with Garbage Polygons
                const gQuery = garbLayer.createQuery();
                gQuery.geometry = feat.geometry;
                gQuery.spatialRelationship = "intersects";
                gQuery.outFields = ["Service_Da"];

                const gRes = await garbLayer.queryFeatures(gQuery);

                if (gRes.features.length > 0) {
                    const day = gRes.features[0].attributes["Service_Da"];
                    box.innerHTML = `
                        <div style="color:#555">Address: <strong>${cleanAddr}</strong></div>
                        <div style="margin-top:12px">Your Garbage Day is:</div>
                        <span class="day-result">${day}</span>
                    `;
                } else {
                    box.innerHTML = `<strong>${cleanAddr}</strong> was found, but it is outside the city's garbage service boundary.`;
                }

            } catch (err) {
                console.error(err);
                box.classList.add("error");
                box.innerHTML = "The city's data server is currently unreachable. Please try again later.";
            }
        };
    });
</script>

</body>
</html>
