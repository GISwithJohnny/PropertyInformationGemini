<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chattanooga Garbage Day Lookup</title>
    
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 500px; 
        }
        h2 { color: #1a5a96; margin-top: 0; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            outline: none; 
            font-size: 16px;
        }
        input:focus { border-color: #0079c1; }
        button { 
            padding: 12px 24px; 
            background: #0079c1; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #005e96; }
        #results { 
            display: none; 
            padding: 20px; 
            border-radius: 8px; 
            background: #eef7ff; 
            border-left: 5px solid #0079c1; 
            line-height: 1.6;
        }
        .day-val { 
            font-size: 2rem; 
            font-weight: bold; 
            color: #d32f2f; 
            margin-top: 10px;
        }
        .error { color: #d32f2f; font-weight: bold; }
        .loading { font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>Garbage Collection</h2>
    <p>Enter your Chattanooga address to find your service day.</p>
    
    <div class="input-group">
        <input type="text" id="addressInput" placeholder="e.g. 123 E Main St">
        <button onclick="lookupAddress()">Search</button>
    </div>

    <div id="results"></div>
</div>

<script>
    require([
        "esri/layers/FeatureLayer"
    ], function(FeatureLayer) {

        // 1. Initialize Layers
        // Note: Using a CORS proxy for the City of Chattanooga server to prevent "Service Unavailable" errors on GitHub
        const addressLayer = new FeatureLayer({
            url: "https://corsproxy.io/?https://pwgis.chattanooga.gov/arcgis/rest/services/Misc/Addressing_FeatService/FeatureServer/0"
        });

        const garbageLayer = new FeatureLayer({
            url: "https://services2.arcgis.com/OIAIimblRxPs0xxc/arcgis/rest/services/Garbage_Service_Areas/FeatureServer/0"
        });

        window.lookupAddress = async function() {
            const input = document.getElementById("addressInput").value.trim().toUpperCase();
            const resultsDiv = document.getElementById("results");
            
            if (!input) return;

            resultsDiv.style.display = "block";
            resultsDiv.innerHTML = '<span class="loading">Searching city records...</span>';

            try {
                // 2. Query Address Point Layer
                const addrQuery = addressLayer.createQuery();
                // Using LIKE for fuzzy matching against common Chattanooga address fields
                addrQuery.where = `FullAddres LIKE '%${input}%' OR ADDR_LABEL LIKE '%${input}%'`;
                addrQuery.outFields = ["FullAddres", "ADDR_LABEL"];
                addrQuery.returnGeometry = true;
                addrQuery.num = 1; 

                const addrResponse = await addressLayer.queryFeatures(addrQuery);

                if (addrResponse.features.length === 0) {
                    resultsDiv.innerHTML = "<span class='error'>Address not found. Please try again with just the number and street name.</span>";
                    return;
                }

                const match = addrResponse.features[0];
                const point = match.geometry;
                const validatedAddr = match.attributes.FullAddres || match.attributes.ADDR_LABEL || "This Address";

                resultsDiv.innerHTML = `Searching route for: <strong>${validatedAddr}</strong>...`;

                // 3. Query Garbage Layer via Spatial Intersection
                const garbQuery = garbageLayer.createQuery();
                garbQuery.geometry = point;
                garbQuery.spatialRelationship = "intersects";
                garbQuery.outFields = ["Service_Da"];

                const garbResponse = await garbageLayer.queryFeatures(garbQuery);

                if (garbResponse.features.length > 0) {
                    const day = garbResponse.features[0].attributes["Service_Da"];
                    resultsDiv.innerHTML = `
                        <div>Location: <strong>${validatedAddr}</strong></div>
                        <div style="margin-top:15px;">Your Collection Day is:</div>
                        <div class="day-val">${day}</div>
                    `;
                } else {
                    resultsDiv.innerHTML = `<strong>${validatedAddr}</strong> found, but it appears to be outside the garbage service area boundaries.`;
                }

            } catch (err) {
                console.error("Query Error:", err);
                resultsDiv.innerHTML = "<span class='error'>Service currently unavailable. The city data server may be down or blocking the request.</span>";
            }
        };

        // Allow "Enter" key to trigger search
        document.getElementById("addressInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                lookupAddress();
            }
        });
    });
</script>

</body>
</html>
